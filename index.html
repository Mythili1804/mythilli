<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleHub</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

header {
    background: black;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
}

section {
    padding: 40px;
}

h2 {
    text-align: center;
}

.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
}

.card {
    border: 1px solid #ddd;
    padding: 15px;
    text-align: center;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

.price {
    color: green;
    font-weight: bold;
}

button {
    padding: 8px 15px;
    background: orange;
    border: none;
    color: white;
    cursor: pointer;
}

footer {
    background: black;
    color: white;
    text-align: center;
    padding: 10px;
}
</style>
</head>

<body>

<header>
    <h1>StyleHub</h1>
    <nav>
        <a href="#women">Women</a>
        <a href="#men">Men</a>
        <a href="#kids">Kids</a>
    </nav>
</header>

<!-- WOMEN SECTION -->
<section id="women">
    <h2>Women's Collection</h2>
    <div class="products">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
            <h3>Floral Dress</h3>
            <p class="price">₹1499</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1495121605193-b116b5b09a19">
            <h3>Casual Top</h3>
            <p class="price">₹799</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<!-- MEN SECTION -->
<section id="men">
    <h2>Men's Collection</h2>
    <div class="products">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
            <h3>Formal Shirt</h3>
            <p class="price">₹1199</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b">
            <h3>Denim Jacket</h3>
            <p class="price">₹1999</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<!-- KIDS SECTION -->
<section id="kids">
    <h2>Kids Collection</h2>
    <div class="products">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1503919005314-30d93d07d823">
            <h3>Kids T-Shirt</h3>
            <p class="price">₹499</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1519238263530-99bdd11df2ea">
            <h3>Kids Dress</h3>
            <p class="price">₹899</p>
            <button>Add to Cart</button>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 StyleHub</p>
</footer>

</body>
</html>
